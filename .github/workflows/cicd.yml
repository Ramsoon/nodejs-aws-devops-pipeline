name: Credpal DevOps Pipeline

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Choose Terraform action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:latest ./app

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/credpal-app:latest

  terraform:
    runs-on: ubuntu-latest
    needs: build-and-push

    defaults:
      run:
        working-directory: infra

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply or Destroy
      run: |
        if [ "${{ github.event.inputs.terraform_action }}" == "apply" ]; then
          terraform apply -auto-approve
        else
          terraform destroy -auto-approve
        fi
    - name: Get EC2 Public IP
      id: ec2_ip
      run: |
        echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          echo "Running bootstrap script"
          curl -o bootstrap.sh https://raw.githubusercontent.com/${{ github.repository }}/main/app/bootstrap.sh
          chmod +x bootstrap.sh
          ./bootstrap.sh

          echo "Creating .env file from GitHub secret"
          cat <<EOF > /home/ubuntu/.env
          ${{ secrets.APP_ENV_FILE }}
          EOF

          echo "Login to DockerHub"
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            echo "Pull latest images"
            docker compose pull

            echo "Start containers"
            docker compose up --build -d

            echo "Deployment completed"

